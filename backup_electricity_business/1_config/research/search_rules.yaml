# DARIS 文献检索规则配置
# 适配模型：MTGNN / TimesNet / XGBoost

search_config:
  # 滚雪球检索深度配置
  pasa_snowball_depth: 2  # 参考文献追溯深度（0=禁用，1=仅直接引用，2=两层引用）
  
  # 三模型专属检索关键词
  keywords:
    - "MTGNN 时序预测"
    - "TimesNet 长时序"
    - "XGBoost 时序特征工程"
    - "时空序列预测"
    - "多变量时序预测"
    - "power load forecasting"
    - "time series forecasting"
    - "spatiotemporal forecasting"
  
  # API 配置
  api_sources:
    - name: arXiv
      enabled: true
      priority: 1
      api_type: "arxiv"
      api_url: "https://api.arxiv.org"
      max_results: 50
      request_interval: 3  # 强制间隔 3 秒，防封禁
    - name: Semantic Scholar
      enabled: false  # 待 API 密钥配置
      priority: 2
    - name: 学校图书馆 (Selenium)
      enabled: true
      priority: 3
      platforms:
        - CNKI
        - ScienceDirect
        - Nature
      download_path: "literature/pdf/"

  # 文献过滤规则
  filter_rules:
    year_range:
      start: 2021
      end: 2026
    min_citations: 20
    venue_types:
      - 顶刊
      - 核心期刊
    exclude_types:
      - 综述
      - meta 分析
      - 教学案例
    max_results: 50
    deduplicate: true

  # 异常处理配置
  error_handling:
    api_failure:
      action: switch_source
      max_retries: 3
    download_failure:
      action: skip_after_retries
      max_retries: 3
    zotero_sync_failure:
      action: alert_after_retries
      max_retries: 5