# DARIS Zotero 同步规则配置
# 适配模型：MTGNN / TimesNet / XGBoost

zotero_basic_config:
  api_key: ${ZOTERO_API_KEY}
  user_id: ${ZOTERO_USER_ID}
  library_type: ${ZOTERO_LIBRARY_TYPE}
  collection_name: ${ZOTERO_COLLECTION_NAME}

# 归档规则
archive_rules:
  # 自动分类规则
  auto_categorize: true
  category_field: keywords
  category_mapping:
    MTGNN:
      keywords: ["MTGNN", "图卷积", "时空预测"]
      tags: ["mtgnn", "graph-convolution", "spatiotemporal"]
    TimesNet:
      keywords: ["TimesNet", "时序分解", "长时序"]
      tags: ["timesnet", "decomposition", "long-sequence"]
    XGBoost:
      keywords: ["XGBoost", "特征工程", "时序预测"]
      tags: ["xgboost", "feature-engineering", "time-series"]
  
  # 元数据补全规则
  metadata_completion:
    auto_fill: true
    required_fields:
      - title
      - authors
      - year
      - journal
      - doi
      - abstract
    optional_fields:
      - keywords
      - citations
      - pages
      - volume
      - issue
    source_priority:
      - Semantic Scholar
      - arXiv
      - Crossref
  
  # 标签规则
  tag_rules:
    auto_tag: true
    tag_source: keywords
    custom_tags:
      - "DARIS-imported"
      - "auto-processed"
    priority_tags:
      - "mtgnn"
      - "timesnet"
      - "xgboost"

# 文献过滤规则
filter_rules:
  year_range:
    start: 2021
    end: 2026
  min_citations: 20
  venue_types:
    - 顶刊
    - 核心期刊
  exclude_types:
    - 综述
    - meta 分析
    - 教学案例
  max_results: 50
  deduplicate: true

# 小绿鲸联动配置
xiaolujing_integration:
  enabled: true
  auto_translate: true
  translate_target: zh-CN
  extract_figures: true
  extract_formulas: true
  extract_tables: true

# 同步规则
sync_rules:
  # 本地同步
  local_sync:
    enabled: true
    target_dir: ./literature/structured/
    format: markdown
    include_attachments: true
  
  # Obsidian 同步
  obsidian_sync:
    enabled: true
    target_dir: ./knowledge_base/literature/
    create_backlinks: true
    update_graph: true
  
  # Git 同步
  git_sync:
    enabled: true
    commit_message_prefix: "文献同步："
    auto_commit: true

# 异常处理配置
error_handling:
  api_failure:
    action: switch_source
    max_retries: 3
    fallback_sources:
      - Semantic Scholar
      - arXiv
      - Crossref
  download_failure:
    action: skip_after_retries
    max_retries: 3
    log_failed_dois: true
  metadata_failure:
    action: manual_review
    max_retries: 2
    mark_incomplete: true
  sync_failure:
    action: alert_after_retries
    max_retries: 5
    alert_channel: local_log